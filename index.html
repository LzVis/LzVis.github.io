<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LzVis | Developer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita el scroll por la animación del fondo */
        }

        /* Animación de fondo: Matriz de códigos brillantes */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.6;
            background: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.2), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.2), transparent 25%);
        }

        .blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(180deg, rgba(45, 212, 191, 0.4) 0%, rgba(59, 130, 246, 0.4) 100%);
            border-radius: 50%;
            filter: blur(80px);
            animation: float 10s infinite ease-in-out alternate;
        }

        .blob:nth-child(2) {
            background: linear-gradient(180deg, rgba(168, 85, 247, 0.4) 0%, rgba(236, 72, 153, 0.4) 100%);
            right: 10%;
            top: 10%;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(100px) scale(1.2); }
        }

        /* Tarjeta de cristal (Glassmorphism) */
        .card {
            background: rgba(255, 255, 255, 0.05); /* Transparente */
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            width: 90%;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(20px);
            opacity: 0;
            animation: popIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes popIn {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Avatar e icono animado */
        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 50%;
            margin: 0 auto 1.5rem auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
            animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.6, 1);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: .8; transform: scale(1.05); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p {
            color: #94a3b8;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Botón de saludo interactivo */
        .btn {
            display: inline-block;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }

        .typing-text {
            display: inline-block;
            overflow: hidden;
            white-space: nowrap;
            border-right: 3px solid #60a5fa;
            animation: typing 3s steps(30, end), blink-caret .75s step-end infinite;
            margin-bottom: 1rem;
            font-family: monospace;
            color: #38bdf8;
            font-size: 1rem;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #60a5fa; }
        }
    </style>
</head>
<body>

    <!-- Bolas de colores animadas de fondo -->
    <div class="background-animation">
        <div class="blob"></div>
        <div class="blob"></div>
    </div>

    <!-- Contenido Principal -->
    <div class="card">
        <div class="avatar">🚀</div>
        
        <div class="typing-text">System.out.println("Hello World!");</div>
        
        <h1>LzVis Apps</h1>
        <p>Bienvenido al centro de desarrollo. Creando herramientas, juegos y soluciones creativas para móviles.</p>
        
        <a href="#" class="btn" onclick="saludar()">¡Saludar al Dev!</a>
    </div>

    <script>
        function saludar() {
            const btn = document.querySelector('.btn');
            btn.innerHTML = "¡Gracias por visitar! ✌️";
            btn.style.background = "linear-gradient(135deg, #3b82f6, #8b5cf6)";
            btn.style.border = "none";
            
            // Lluvia de confeti simple usando emojis
            for(let i=0; i<10; i++) {
                setTimeout(() => {
                    const confeti = document.createElement('div');
                    confeti.innerHTML = ['✨','🎉','🚀','💻'][Math.floor(Math.random()*4)];
                    confeti.style.position = 'absolute';
                    confeti.style.left = Math.random() * 100 + 'vw';
                    confeti.style.top = '-20px';
                    confeti.style.fontSize = (Math.random() * 20 + 10) + 'px';
                    confeti.style.zIndex = 100;
                    confeti.style.transition = 'all 2s linear';
                    document.body.appendChild(confeti);
                    
                    setTimeout(() => {
                        confeti.style.top = '100vh';
                        confeti.style.transform = `rotate(${Math.random() * 360}deg) translateX(${Math.random() * 100 - 50}px)`;
                    }, 50);
                    
                    setTimeout(() => confeti.remove(), 2000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
